<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>食材详情</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page ingredient-page-layout">
      <header id="siteNav"></header>

      <div class="page-intro">
        <p class="page-breadcrumb" id="ingredientBreadcrumb">食材详情</p>
      </div>

      <div class="page-toolbar" id="detailToolbar"></div>

      <section class="panel ingredient-hero" id="ingredientHero"></section>
      <section class="panel ingredient-section" id="ingredientNutrition"></section>
      <section class="panel ingredient-section" id="ingredientTips"></section>
      <section class="panel ingredient-section" id="ingredientRecipes"></section>
    </main>

    <div class="confirm-modal" id="deleteIngredientModal" hidden>
      <div class="confirm-modal-backdrop" data-close-delete-ingredient-modal></div>
      <div class="confirm-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="deleteIngredientTitle">
        <div class="confirm-modal-icon" aria-hidden="true">!</div>
        <p class="confirm-modal-eyebrow">危险操作</p>
        <h2 class="confirm-modal-title" id="deleteIngredientTitle">确认删除这个食材？</h2>
        <p class="confirm-modal-desc">
          即将删除「<strong id="deleteIngredientName">当前食材</strong>」。删除后无法恢复，相关详情页将不再显示。
        </p>
        <p class="confirm-modal-note" id="deleteIngredientHint">此操作需要管理员权限。</p>
        <div class="confirm-modal-actions">
          <button class="action-link confirm-modal-cancel" type="button" data-close-delete-ingredient-modal>取消</button>
          <button class="confirm-modal-danger" type="button" id="confirmDeleteIngredientBtn">确认删除</button>
        </div>
      </div>
    </div>

    <script src="./data.js"></script>
    <script src="./ingredient-details.js"></script>
    <script src="./shared/ingredient-sync.js"></script>
    <script src="./content-model.js"></script>
    <script src="./config.js"></script>
    <script src="./api-client.js"></script>
    <script src="./shared/site-nav.js"></script>
    <script src="./ui-toast.js"></script>
    <script src="./ingredient-detail.js"></script>
  </body>
</html>
