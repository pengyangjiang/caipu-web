<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>全部食材</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page ingredients-page">
      <header id="siteNav"></header>

      <div class="page-intro">
        <p class="page-breadcrumb">全部食材</p>
        <h1 class="page-title ingredients-page-title">浏览所有食材</h1>
        <p class="page-desc">
          按分类筛选或搜索名称、别名，点击条目查看营养信息与相关菜谱。
        </p>
      </div>

      <section class="panel ingredients-shell">
        <div class="ingredients-toolbar is-sticky">
          <label class="search-bar ingredients-search" for="ingredientsSearch">
            <span class="search-icon">⌕</span>
            <input
              id="ingredientsSearch"
              type="search"
              placeholder="搜索食材名称、别名..."
              autocomplete="off"
            />
          </label>
          <div class="list-batch-toolbar">
            <button class="action-link" type="button" id="ingredientsBatchToggleBtn" hidden>批量管理</button>
            <div class="list-batch-bar" id="ingredientsBatchBar" hidden>
              <label class="list-batch-select-all">
                <input type="checkbox" id="ingredientsSelectAll" />
                <span>全选当前列表</span>
              </label>
              <span class="list-batch-count" id="ingredientsBatchCount">已选 0 种</span>
              <button class="action-link toolbar-danger" type="button" id="ingredientsBatchDeleteBtn" disabled>删除所选</button>
            </div>
          </div>
          <div class="category-row" id="ingredientsCategoryChips"></div>
          <p class="ingredients-meta" id="ingredientsMeta">正在加载食材...</p>
        </div>

        <div class="ingredients-sections" id="ingredientsSections"></div>
      </section>
    </main>

    <div class="confirm-modal" id="batchDeleteModal" hidden>
      <div class="confirm-modal-backdrop" data-close-batch-modal></div>
      <div class="confirm-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="batchDeleteTitle">
        <div class="confirm-modal-icon" aria-hidden="true">!</div>
        <p class="confirm-modal-eyebrow">危险操作</p>
        <h2 class="confirm-modal-title" id="batchDeleteTitle">确认批量删除？</h2>
        <p class="confirm-modal-desc" id="batchDeleteDesc">删除后无法恢复。</p>
        <p class="confirm-modal-note" id="batchDeleteHint">此操作需要管理员权限。</p>
        <div class="confirm-modal-actions">
          <button class="action-link confirm-modal-cancel" type="button" data-close-batch-modal>取消</button>
          <button class="confirm-modal-danger" type="button" id="confirmBatchDeleteBtn">确认删除</button>
        </div>
      </div>
    </div>

    <script src="./data.js"></script>
    <script src="./ingredient-details.js"></script>
    <script src="./shared/ingredient-sync.js"></script>
    <script src="./content-model.js"></script>
    <script src="./config.js"></script>
    <script src="./api-client.js"></script>
    <script src="./shared/site-nav.js"></script>
    <script src="./shared/list-batch-ui.js"></script>
    <script src="./ui-toast.js"></script>
    <script src="./ingredients.js"></script>
  </body>
</html>
