<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>全部菜品</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page recipes-page">
      <header id="siteNav"></header>

      <div class="page-intro">
        <p class="page-breadcrumb">全部菜品</p>
        <h1 class="page-title recipes-page-title">浏览所有可选菜谱</h1>
        <p class="page-desc">
          按分类筛选或搜索菜名、标签，点击卡片进入详情页查看做法与营养信息。
        </p>
      </div>

      <section class="panel recipes-shell">
        <div class="recipes-toolbar is-sticky">
          <label class="search-bar recipes-search" for="recipesSearch">
            <span class="search-icon">⌕</span>
            <input
              id="recipesSearch"
              type="search"
              placeholder="搜索菜名、标签、食材..."
              autocomplete="off"
            />
          </label>
          <div class="list-batch-toolbar">
            <button class="action-link" type="button" id="recipesBatchToggleBtn" hidden>批量管理</button>
            <div class="list-batch-bar" id="recipesBatchBar" hidden>
              <label class="list-batch-select-all">
                <input type="checkbox" id="recipesSelectAll" />
                <span>全选当前列表</span>
              </label>
              <span class="list-batch-count" id="recipesBatchCount">已选 0 道菜</span>
              <button class="action-link toolbar-danger" type="button" id="recipesBatchDeleteBtn" disabled>删除所选</button>
            </div>
          </div>
          <div class="category-row" id="recipesCategoryChips"></div>
          <p class="recipes-meta" id="recipesMeta">正在加载菜品...</p>
        </div>

        <div class="recipe-grid" id="recipesGrid"></div>
      </section>
    </main>

    <div class="confirm-modal" id="batchDeleteModal" hidden>
      <div class="confirm-modal-backdrop" data-close-batch-modal></div>
      <div class="confirm-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="batchDeleteTitle">
        <div class="confirm-modal-icon" aria-hidden="true">!</div>
        <p class="confirm-modal-eyebrow">危险操作</p>
        <h2 class="confirm-modal-title" id="batchDeleteTitle">确认批量删除？</h2>
        <p class="confirm-modal-desc" id="batchDeleteDesc">删除后无法恢复。</p>
        <p class="confirm-modal-note" id="batchDeleteHint">此操作需要管理员权限。</p>
        <div class="confirm-modal-actions">
          <button class="action-link confirm-modal-cancel" type="button" data-close-batch-modal>取消</button>
          <button class="confirm-modal-danger" type="button" id="confirmBatchDeleteBtn">确认删除</button>
        </div>
      </div>
    </div>

    <script src="./data.js"></script>
    <script src="./ingredient-details.js"></script>
    <script src="./shared/nutrition-profile.js"></script>
    <script src="./content-model.js"></script>
    <script src="./config.js"></script>
    <script src="./api-client.js"></script>
    <script src="./shared/site-nav.js"></script>
    <script src="./shared/list-batch-ui.js"></script>
    <script src="./ui-toast.js"></script>
    <script src="./recipes.js"></script>
  </body>
</html>
