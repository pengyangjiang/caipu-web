<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>内容编辑</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page edit-page">
      <header id="siteNav"></header>

      <div class="page-intro">
        <p class="page-breadcrumb" id="editBreadcrumb">内容编辑</p>
        <h1 class="edit-title page-title" id="editTitle">正在加载内容</h1>
        <p class="edit-desc page-desc" id="editDesc">请稍候，编辑表单正在准备中。</p>
      </div>

      <section class="panel edit-shell">
        <div class="edit-summary">
          <div class="edit-status-card">
            <p class="ingredient-info-title">保存状态</p>
            <p class="edit-status" id="editStatus">加载中</p>
            <p class="metric-sub" id="editModeHint">读取内容中</p>
            <p class="edit-notice" id="editNotice"></p>
          </div>
        </div>

        <form id="editForm" class="edit-form"></form>
      </section>
    </main>

    <aside class="edit-sticky-bar" id="editStickyBar" hidden>
      <div class="edit-sticky-bar-inner">
        <a class="action-link" id="editStickyBack" href="./index.html">返回</a>
        <span class="edit-sticky-status" id="editStickyStatus">有未保存的修改</span>
        <button class="favorite-button is-active" type="submit" form="editForm" id="editStickySave">保存修改</button>
      </div>
    </aside>

    <div class="confirm-modal" id="createRecipeModal" hidden>
      <div class="confirm-modal-backdrop" data-close-create-modal></div>
      <div class="confirm-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="createModalTitle">
        <div class="confirm-modal-icon" aria-hidden="true">?</div>
        <p class="confirm-modal-eyebrow">创建确认</p>
        <h2 class="confirm-modal-title" id="createModalTitle">确认创建这道菜谱？</h2>
        <p class="confirm-modal-desc" id="createRecipeSummary">请确认内容已填写完整，创建后将写入菜谱库。</p>
        <p class="confirm-modal-note">建议先使用 AI 生成或手动填写步骤、原材料后再创建。</p>
        <div class="confirm-modal-actions">
          <button class="action-link confirm-modal-cancel" type="button" data-close-create-modal>再检查一下</button>
          <button class="favorite-button is-active" type="button" id="confirmCreateRecipeBtn">确认创建</button>
        </div>
      </div>
    </div>

    <script src="./data.js"></script>
    <script src="./recipe-details.js"></script>
    <script src="./ingredient-details.js"></script>
    <script src="./shared/nutrition-profile.js"></script>
    <script src="./shared/ingredient-sync.js"></script>
    <script src="./content-model.js"></script>
    <script src="./config.js"></script>
    <script src="./api-client.js"></script>
    <script src="./shared/site-nav.js"></script>
    <script src="./edit.js"></script>
  </body>
</html>
