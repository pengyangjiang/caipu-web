<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>菜谱详情</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <header id="siteNav"></header>

      <div class="page-intro">
        <p class="page-breadcrumb" id="recipeBreadcrumb">菜谱详情</p>
      </div>

      <div class="page-toolbar" id="detailToolbar"></div>

      <section class="panel section">
        <div id="detailRoot"></div>
      </section>
    </main>

    <div class="confirm-modal" id="deleteRecipeModal" hidden>
      <div class="confirm-modal-backdrop" data-close-delete-modal></div>
      <div class="confirm-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
        <div class="confirm-modal-icon" aria-hidden="true">!</div>
        <p class="confirm-modal-eyebrow">危险操作</p>
        <h2 class="confirm-modal-title" id="deleteModalTitle">确认删除这道菜谱？</h2>
        <p class="confirm-modal-desc">
          即将删除「<strong id="deleteRecipeName">当前菜谱</strong>」。删除后无法恢复，列表和详情页将不再显示。
        </p>
        <p class="confirm-modal-note" id="deleteRecipeHint">此操作需要管理员权限，并会同步到线上数据。</p>
        <div class="confirm-modal-actions">
          <button class="action-link confirm-modal-cancel" type="button" data-close-delete-modal>取消</button>
          <button class="confirm-modal-danger" type="button" id="confirmDeleteRecipeBtn">确认删除</button>
        </div>
      </div>
    </div>

    <script src="./data.js"></script>
    <script src="./recipe-details.js"></script>
    <script src="./ingredient-details.js"></script>
    <script src="./shared/nutrition-profile.js"></script>
    <script src="./content-model.js"></script>
    <script src="./config.js"></script>
    <script src="./api-client.js"></script>
    <script src="./shared/site-nav.js"></script>
    <script src="./ui-toast.js"></script>
    <script src="./recipe-detail.js"></script>
  </body>
</html>
