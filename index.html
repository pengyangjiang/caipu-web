<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>菜谱搜索页</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <header id="siteNav"></header>

      <section class="panel home-hero">
        <div class="hero-copy">
          <p class="eyebrow">今日吃什么</p>
          <h1 class="page-title">先搜一搜，再决定午餐和晚餐</h1>
          <p class="page-desc">
            输入菜名、食材或口味，快速找到适合早餐、午餐、晚餐和减脂的菜谱。
          </p>
        </div>

        <div class="search-shell">
          <div class="search-mode-tabs" id="searchModeTabs" role="tablist" aria-label="搜索模式">
            <button class="search-mode-tab active" type="button" role="tab" aria-selected="true" data-search-mode="recipe">搜菜名</button>
            <button class="search-mode-tab" type="button" role="tab" aria-selected="false" data-search-mode="ingredient">按食材</button>
          </div>

          <div class="search-mode-panel" id="recipeSearchPanel" role="tabpanel">
            <label class="search-bar" for="recipeSearch">
              <span class="search-icon">⌕</span>
              <input
                id="recipeSearch"
                type="search"
                placeholder="搜索菜名、食材、口味，例如：鸡胸、番茄、减脂"
                autocomplete="off"
              />
            </label>
            <div class="search-hints search-hints-inline" id="searchHints"></div>
            <div class="category-row" id="categoryChips"></div>
            <div class="search-meta">
              <span id="resultCount"></span>
            </div>
          </div>

          <div class="search-mode-panel" id="ingredientSearchPanel" role="tabpanel" hidden>
            <div class="ingredient-search-head">
              <span class="ingredient-search-title">我手里有这些食材</span>
              <span class="ingredient-search-note">输入后按匹配度推荐可做菜品</span>
            </div>
            <div class="ingredient-search-bar">
              <input
                id="fridgeIngredients"
                type="text"
                placeholder="例如：鸡胸肉, 番茄, 鸡蛋"
                autocomplete="off"
              />
              <button id="ingredientSearchBtn" type="button">按食材找菜</button>
            </div>
            <div class="ingredient-mode-row" id="ingredientModeChips"></div>
            <div class="ingredient-chip-row" id="ingredientChips"></div>
            <button class="ingredient-more-btn" type="button" id="ingredientMoreBtn" hidden>更多食材</button>
            <div class="search-meta">
              <span id="ingredientResultCount"></span>
            </div>
          </div>
        </div>
      </section>

      <section class="panel section">
        <div class="section-header">
          <div>
            <h2 class="section-title">推荐菜谱</h2>
            <p class="section-note">点击卡片可预览摘要，或进入完整详情页</p>
          </div>
        </div>
        <div class="recipe-grid" id="recipeGrid"></div>
      </section>

      <section class="panel section home-preview-section" id="previewSection" hidden>
        <div class="section-header">
          <div>
            <h2 class="section-title">菜谱详情预览</h2>
            <p class="section-note">快速查看热量、匹配度和常用食材</p>
          </div>
          <button class="action-link" type="button" id="closePreviewBtn">收起预览</button>
        </div>
        <div id="detailPanel"></div>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="./ingredient-details.js"></script>
    <script src="./shared/ingredient-sync.js"></script>
    <script src="./shared/nutrition-profile.js"></script>
    <script src="./content-model.js"></script>
    <script src="./config.js"></script>
    <script src="./api-client.js"></script>
    <script src="./shared/site-nav.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
